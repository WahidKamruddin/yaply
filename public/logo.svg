<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="112" fill="#1a2744"/>
  <defs>
    <!-- Gradient coords: inner (7,13)→(74,76) scaled 4.48 + offset(45,45) for centering -->
    <linearGradient id="yg" x1="76" y1="103" x2="377" y2="385" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6BA8FF"/>
      <stop offset="100%" stop-color="#3B6FE0"/>
    </linearGradient>
  </defs>
  <!-- Mark centered in 512x512 with ~13% padding each side -->
  <!-- inner 80x80 → scale 4.48, offset (45, 45) to center -->
  <g transform="translate(45 45) scale(4.48)">
    <!-- Left arm -->
    <rect x="-7" y="-20" width="14" height="40" rx="7" fill="url(#yg)"
      transform="translate(25.86 31.86) rotate(-45)"/>
    <!-- Right arm -->
    <rect x="-7" y="-20" width="14" height="40" rx="7" fill="url(#yg)"
      transform="translate(54.14 31.86) rotate(45)"/>
    <!-- Stem -->
    <rect x="33" y="39" width="14" height="37" rx="7" fill="url(#yg)"/>
  </g>
</svg>
